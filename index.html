<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Member VIP - Translator Pegon</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;700&display=swap" rel="stylesheet">

</head>
<body>

<!-- LOGIN GOOGLE -->

<div id="loginPage" class="login-page">

    <div class="login-card">

        <h1>Member VIP</h1>

        <p>
            Login menggunakan akun Google untuk menggunakan Translator Pegon
        </p>

        <button id="googleLoginBtn" class="google-btn">

            <img
            src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
            alt="Google">

            Masuk Dengan Google

        </button>

    </div>

</div>

<!-- HALAMAN APP -->

<div id="appPage" style="display:none;">

    <!-- HEADER -->

    <header>

        <div>

            <h1>Translator Pegon</h1>

            <p>
                Bahasa Indonesia → Arab Pegon
            </p>

        </div>

        <div class="user-box">

            <img
            id="userPhoto"
            src=""
            alt="Foto">

            <div>

                <div id="userName">
                    User
                </div>

                <div id="memberBadge">
                    FREE
                </div>

            </div>

            <button id="logoutBtn">
                Logout
            </button>

        </div>

    </header>

    <!-- KONTEN -->

    <main class="container">

        <!-- INPUT -->

        <div class="card">

            <div class="card-header">

                <h3>Bahasa Indonesia</h3>

                <button id="clearBtn">
                    Hapus
                </button>

            </div>

            <textarea
            id="inputLatin"
            placeholder="Ketik teks Bahasa Indonesia di sini..."></textarea>

            <div class="counter">

                Kata digunakan:

                <span id="wordCount">0</span>

                /

                <span>200</span>

            </div>

        </div>

        <!-- OUTPUT -->

        <div class="card">

            <div class="card-header">

                <h3>Arab Pegon</h3>

                <button id="copyBtn">
                    Salin
                </button>

            </div>

            <textarea
            id="outputPegon"
            readonly></textarea>

        </div>

    </main>

</div>

<!-- MODAL VIP -->

<div id="vipModal" class="modal">

    <div class="modal-content">

        <h2>Upgrade Member VIP</h2>

        <p>

            Akun GRATIS dibatasi maksimal
            <b>200 kata</b>.

        </p>

        <div class="vip-grid">

            <div class="vip-card">

                <h3>VIP 1 Bulan</h3>

                <h2>Rp25.000</h2>

                <button id="vipBulanan">
                    Upgrade Sekarang
                </button>

            </div>

            <div class="vip-card">

                <h3>VIP 1 Tahun</h3>

                <h2>Rp300.000</h2>

                <button id="vipTahunan">
                    Upgrade Sekarang
                </button>

            </div>

        </div>

        <button
        id="closeModal"
        class="close-btn">

            Tutup

        </button>

    </div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
